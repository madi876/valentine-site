<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sarah ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb199);
    color: white;
}

/* Background hearts */
.bg-hearts span {
    position: absolute;
    font-size: 20px;
    opacity: 0.6;
    animation: float linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}

/* Center content */
.container {
    z-index: 2;
}

h1 {
    font-size: 30px;
    margin-bottom: 20px;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#yesBtn { background: green; color: white; }
#noBtn { background: red; color: white; }

/* emoji rain */
@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- Hearts -->
<div class="bg-hearts" id="bgHearts"></div>

<div class="container" id="mainContent">
    <h1>Will you be my Valentine, Sarah (moto😌)? ❤️</h1>

    <div class="buttons">
        <button id="yesBtn" onclick="yesClicked()">Yes 💚</button>
        <button id="noBtn" onclick="noClicked()">No ❤️</button>
    </div>
</div>

<!-- Music -->
<audio id="bgMusic" autoplay loop>
    <source src="love.mp3" type="audio/mpeg">
</audio>

<script>
let noCount = 0;

const messages = [
    "Think again ❤️",
    "Motoo soch leee 🥺",
    "Please say yes… hun tay khana v bna lenda 😋❤️",
    "Don’t break my heart 😭",
    "Dekh le mere jysa cool bnda tno nai milna🥰",
    "I’ll treat you like a princies 👑",
    "Please say yes 😭❤️",
    "Last chance 🥺❤️"
];

// Force music start (for mobile)
document.addEventListener("click", () => {
    document.getElementById("bgMusic").play();
}, { once: true });

// NO button
function noClicked() {
    noCount++;

    let yesBtn = document.getElementById("yesBtn");
    let noBtn = document.getElementById("noBtn");

    let size = parseFloat(window.getComputedStyle(yesBtn).fontSize);
    yesBtn.style.fontSize = (size + 5) + "px";

    if (noCount <= messages.length) {
        noBtn.innerText = messages[noCount - 1];
    } else {
        noBtn.innerText = "Still no? 😭💔";
    }
}

// YES button
function yesClicked() {

    let music = document.getElementById("bgMusic");

    // Jump to mid (peak moment)
    music.currentTime = 45;
    music.play();

    document.body.innerHTML = "";

    let msg = document.createElement("div");
    msg.style.fontSize = "35px";
    msg.style.marginTop = "80px";
    msg.innerHTML = "Mno ty phle e pata c k toh mno pyar krdi😍❤️<br>I Love youuu 2 mri Jan 💕😘<br>But sory i have a gf sory sarah🥺<br>lkin ab soch ra gf koo chor diya jay🥱☺️  ";

    document.body.appendChild(msg);

    // Back button
    let backBtn = document.createElement("button");
    backBtn.innerText = "Go Back 🔙";
    backBtn.style.marginTop = "30px";
    backBtn.style.padding = "10px 20px";
    backBtn.style.border = "none";
    backBtn.style.borderRadius = "8px";
    backBtn.style.background = "black";
    backBtn.style.color = "white";

    backBtn.onclick = () => location.reload();

    document.body.appendChild(backBtn);

    const emojis = ["❤️","💕","💋","💖","😘","😍","🎉","🥰","💘","💋"];

    setInterval(() => {
        let drop = document.createElement("div");
        drop.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

        drop.style.position = "fixed";
        drop.style.left = Math.random() * window.innerWidth + "px";
        drop.style.top = "-50px";
        drop.style.fontSize = (20 + Math.random() * 25) + "px";
        drop.style.animation = "fall 4s linear";

        document.body.appendChild(drop);

        setTimeout(() => drop.remove(), 4000);

    }, 100);
}

// INSTANT hearts (no delay)
function createHearts() {
    const container = document.getElementById("bgHearts");

    for (let i = 0; i < 40; i++) {
        let heart = document.createElement("span");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (4 + Math.random() * 4) + "s";
        heart.style.fontSize = (15 + Math.random() * 20) + "px";

        container.appendChild(heart);
    }
}

// run immediately
createHearts();
</script>

</body>
</html>
